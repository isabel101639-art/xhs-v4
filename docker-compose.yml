services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-xhs_v4}
      POSTGRES_USER: ${POSTGRES_USER:-xhs_v4}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-xhs_v4} -d ${POSTGRES_DB:-xhs_v4}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-xhs_v4}:${POSTGRES_PASSWORD:-change_me}@postgres:5432/${POSTGRES_DB:-xhs_v4}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      CREATOR_SYNC_SOURCE_CHANNEL: ${CREATOR_SYNC_SOURCE_CHANNEL:-Crawler服务}
      CREATOR_SYNC_FETCH_MODE: ${CREATOR_SYNC_FETCH_MODE:-auto}
      CREATOR_SYNC_API_URL: ${CREATOR_SYNC_API_URL:-}
      CREATOR_SYNC_API_METHOD: ${CREATOR_SYNC_API_METHOD:-POST}
      CREATOR_SYNC_API_HEADERS_JSON: ${CREATOR_SYNC_API_HEADERS_JSON:-}
      CREATOR_SYNC_API_QUERY_JSON: ${CREATOR_SYNC_API_QUERY_JSON:-}
      CREATOR_SYNC_API_BODY_JSON: ${CREATOR_SYNC_API_BODY_JSON:-}
      CREATOR_SYNC_RESULT_PATH: ${CREATOR_SYNC_RESULT_PATH:-}
      CREATOR_SYNC_TIMEOUT_SECONDS: ${CREATOR_SYNC_TIMEOUT_SECONDS:-60}
      CREATOR_SYNC_BATCH_LIMIT: ${CREATOR_SYNC_BATCH_LIMIT:-20}
      PORT: 8000
      FLASK_DEBUG: 0
      PREFERRED_URL_SCHEME: ${PREFERRED_URL_SCHEME:-https}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      DEFAULT_TOPIC_QUOTA: ${DEFAULT_TOPIC_QUOTA:-30}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-4}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/healthz || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
    command: ["./docker/entrypoint-worker.sh"]
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-xhs_v4}:${POSTGRES_PASSWORD:-change_me}@postgres:5432/${POSTGRES_DB:-xhs_v4}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      CREATOR_SYNC_SOURCE_CHANNEL: ${CREATOR_SYNC_SOURCE_CHANNEL:-Crawler服务}
      CREATOR_SYNC_FETCH_MODE: ${CREATOR_SYNC_FETCH_MODE:-auto}
      CREATOR_SYNC_API_URL: ${CREATOR_SYNC_API_URL:-}
      CREATOR_SYNC_API_METHOD: ${CREATOR_SYNC_API_METHOD:-POST}
      CREATOR_SYNC_API_HEADERS_JSON: ${CREATOR_SYNC_API_HEADERS_JSON:-}
      CREATOR_SYNC_API_QUERY_JSON: ${CREATOR_SYNC_API_QUERY_JSON:-}
      CREATOR_SYNC_API_BODY_JSON: ${CREATOR_SYNC_API_BODY_JSON:-}
      CREATOR_SYNC_RESULT_PATH: ${CREATOR_SYNC_RESULT_PATH:-}
      CREATOR_SYNC_TIMEOUT_SECONDS: ${CREATOR_SYNC_TIMEOUT_SECONDS:-60}
      CREATOR_SYNC_BATCH_LIMIT: ${CREATOR_SYNC_BATCH_LIMIT:-20}
      FLASK_DEBUG: 0
      DEFAULT_TOPIC_QUOTA: ${DEFAULT_TOPIC_QUOTA:-30}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: .
    command: ["./docker/entrypoint-beat.sh"]
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-xhs_v4}:${POSTGRES_PASSWORD:-change_me}@postgres:5432/${POSTGRES_DB:-xhs_v4}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      CREATOR_SYNC_SOURCE_CHANNEL: ${CREATOR_SYNC_SOURCE_CHANNEL:-Crawler服务}
      CREATOR_SYNC_FETCH_MODE: ${CREATOR_SYNC_FETCH_MODE:-auto}
      CREATOR_SYNC_API_URL: ${CREATOR_SYNC_API_URL:-}
      CREATOR_SYNC_API_METHOD: ${CREATOR_SYNC_API_METHOD:-POST}
      CREATOR_SYNC_API_HEADERS_JSON: ${CREATOR_SYNC_API_HEADERS_JSON:-}
      CREATOR_SYNC_API_QUERY_JSON: ${CREATOR_SYNC_API_QUERY_JSON:-}
      CREATOR_SYNC_API_BODY_JSON: ${CREATOR_SYNC_API_BODY_JSON:-}
      CREATOR_SYNC_RESULT_PATH: ${CREATOR_SYNC_RESULT_PATH:-}
      CREATOR_SYNC_TIMEOUT_SECONDS: ${CREATOR_SYNC_TIMEOUT_SECONDS:-60}
      CREATOR_SYNC_BATCH_LIMIT: ${CREATOR_SYNC_BATCH_LIMIT:-20}
      ENABLE_AUTOMATION_BEAT: ${ENABLE_AUTOMATION_BEAT:-true}
      CELERY_BEAT_LOG_LEVEL: ${CELERY_BEAT_LOG_LEVEL:-info}
      FLASK_DEBUG: 0
      DEFAULT_TOPIC_QUOTA: ${DEFAULT_TOPIC_QUOTA:-30}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  crawler:
    build:
      context: ./crawler_service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CRAWLER_PROVIDER: ${CRAWLER_PROVIDER:-mock}
      CRAWLER_PORT: ${CRAWLER_PORT:-8081}
      CRAWLER_REQUEST_TIMEOUT_SECONDS: ${CRAWLER_REQUEST_TIMEOUT_SECONDS:-60}
      XHS_PROFILE_URL_TEMPLATE: ${XHS_PROFILE_URL_TEMPLATE:-https://www.xiaohongshu.com/user/profile/{account_handle}}
      PLAYWRIGHT_HEADLESS: ${PLAYWRIGHT_HEADLESS:-true}
      PLAYWRIGHT_NAVIGATION_TIMEOUT_MS: ${PLAYWRIGHT_NAVIGATION_TIMEOUT_MS:-30000}
      PLAYWRIGHT_STORAGE_STATE_PATH: ${PLAYWRIGHT_STORAGE_STATE_PATH:-}
      PLAYWRIGHT_BROWSER_CHANNEL: ${PLAYWRIGHT_BROWSER_CHANNEL:-}
      XHS_WAIT_AFTER_LOGIN_SECONDS: ${XHS_WAIT_AFTER_LOGIN_SECONDS:-90}
      XHS_DEBUG_OUTPUT_DIR: ${XHS_DEBUG_OUTPUT_DIR:-/tmp/xhs_crawler_debug}
      XHS_PROFILE_NAME_SELECTOR: ${XHS_PROFILE_NAME_SELECTOR:-}
      XHS_FOLLOWER_COUNT_SELECTOR: ${XHS_FOLLOWER_COUNT_SELECTOR:-}
      XHS_POST_CARD_SELECTOR: ${XHS_POST_CARD_SELECTOR:-}
      XHS_POST_LINK_SELECTOR: ${XHS_POST_LINK_SELECTOR:-}
      XHS_POST_TITLE_SELECTOR: ${XHS_POST_TITLE_SELECTOR:-}
      XHS_POST_LIKES_SELECTOR: ${XHS_POST_LIKES_SELECTOR:-}
      XHS_POST_COMMENTS_SELECTOR: ${XHS_POST_COMMENTS_SELECTOR:-}
      XHS_POST_FAVORITES_SELECTOR: ${XHS_POST_FAVORITES_SELECTOR:-}
      XHS_POST_VIEWS_SELECTOR: ${XHS_POST_VIEWS_SELECTOR:-}
      XHS_POST_TIME_SELECTOR: ${XHS_POST_TIME_SELECTOR:-}
      XHS_MAX_POSTS_PER_ACCOUNT: ${XHS_MAX_POSTS_PER_ACCOUNT:-20}
      MOCK_POSTS_PER_ACCOUNT: ${MOCK_POSTS_PER_ACCOUNT:-2}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8081/healthz || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/healthz >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
