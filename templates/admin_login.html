<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - 福瑞医科小红书任务</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --xhs-red: #ff2442; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, var(--xhs-red) 0%, #ff6b6b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        .btn-xhs { 
            background: var(--xhs-red); 
            color: white; 
            border: none; 
            border-radius: 25px;
            padding: 12px;
        }
    
        /* MOBILE_PATCH */
        @media (max-width: 768px) {
            .container { padding-left: 12px; padding-right: 12px; }
            .card { padding: 14px !important; }
        }

    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <h3><i class="bi bi-gear-fill text-danger"></i> 后台管理</h3>
            <p class="text-muted">福瑞医科小红书任务管理系统</p>
        </div>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">用户名</label>
                <input type="text" name="username" class="form-control" placeholder="furui" required>
            </div>
            <div class="mb-4">
                <label class="form-label">密码</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-xhs w-100">登录</button>
        </form>

        <div class="text-center mt-3">
            <a href="/" class="text-muted">返回首页</a>
        </div>
    </div>
</body>
</html>
