<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活动详情 - 福瑞医科小红书任务</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; background: #f5f5f5; }
        .navbar { background: linear-gradient(135deg, #ff2442 0%, #ff6b6b 100%); }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">← 返回首页</a>
        </div>
    </nav>

    <div class="container">
        <h4>{{ activity.name }}</h4>
        <p class="text-muted">{{ activity.title }}</p>
        
        <div class="row mt-4">
            {% for topic in activity.topics %}
            <div class="col-md-4 mb-3">
                <div class="card">
                    <div class="card-body">
                        <h6>{{ topic.topic_name }}</h6>
                        <p class="text-muted mb-1">组号: {{ topic.group_num }}</p>
                        <p class="mb-1">名额: {{ topic.filled }}/{{ topic.quota }}</p>
                        <span class="badge {% if topic.filled >= topic.quota %}bg-secondary{% else %}bg-success{% endif %}">
                            {{ '已满' if topic.filled >= topic.quota else '报名中' }}
                        </span>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
